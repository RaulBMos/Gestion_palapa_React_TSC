<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CasaGestión - Gestión Vacacional</title>
  <meta name="description"
    content="Aplicación de gestión integral para casas vacacionales. Control de reservas, finanzas y clientes." />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#0ea5e9">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CasaGestión">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">

  <!-- Custom CSS -->
  <style>
    html,
    body,
    #root {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      overscroll-behavior-y: none;
    }

    /* Support for system theme preference */
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #0f172a;
        color: #e2e8f0;
      }
    }
  </style>

  <script>
    // Listen for system theme changes
    const observer = new MutationObserver(() => {
      const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.toggle('dark', isDark);
    });
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
    
    // Set initial state
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>

<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 h-screen overflow-hidden">
  <div id="root" class="h-full w-full"></div>
  <script type="module" src="./src/index.tsx"></script>
</body>

</html>
